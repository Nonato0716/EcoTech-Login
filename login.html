<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTech - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form">
            <h1>EcoTech</h1>
            <h2>Login de parceiros</h2>
            <form id="login-form">
                <label for="email">E-mail:</label>
                <input type="email" placeholder="exemplo@email.com" id="email" required>
                <label for="senha">Senha:</label>
                <input type="password" placeholder="********" id="senha" required>
                <button onclick="login()"><span>ENTRAR NO PORTAL</span></button>
            </form>
        </div>
        <ul class="lista">
            <li><a href="">Essqueci minha senha</a></li>
            <li><a href="">Voltar para o site principal</a></li>
        </ul>
    </div>
</body>
</html>
